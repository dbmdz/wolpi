site_name: 'Wolpi: An Extensible IIIF Image Server'
site_url: https://wolpi.mdz.dev
site_dir: public
watch:
  - ./docs
copyright: Made with 🐇❤️ in Munich, Germany at the Bavarian State Library
extra:
  generator: false

theme:
  logo: ./img/icon.png
  favicon: img/favicon.png
  name: material
  features:
    - header.autohide
    - content.tabs.link
    - content.code.annotate
  palette:
    # Automatic/Dark/Light mode palette toggles
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
      primary: custom
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
      primary: custom
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
      primary: custom

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - attr_list
  - admonition
  - md_in_html
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true

plugins:
  - search

nav:
  - Home: index.md
  - "Getting Started":
      - "Serving your first image": getting-started/serving-your-first-image.md
      - "Using an extension: Resolving with Regular Expressions": getting-started/using-an-extension-pattern-resolver.md
  - "How to...":
      - "...deploy Wolpi using Docker/Podman": how-to/deploy-using-docker-podman.md
      - "...deploy Wolpi using the JAR": how-to/deploy-using-the-jar.md
      - "...deploy Wolpi on Kubernetes": how-to/deploy-on-kubernetes.md
      - "...expose Wolpi behind a reverse proxy": how-to/expose-wolpi-behind-a-reverse-proxy.md
      - "...install extensions": how-to/install-extensions.md
      - "...build containers with pre-installed extensions": how-to/build-containers-with-pre-installed-extensions.md
      - "...optimize the configuration for better performance": how-to/optimize-the-configuration-for-better-performance.md
  - Concepts:
      - "Request and Image Processing Pipeline": concepts/request-and-image-processing-pipeline.md
      - "Extension Execution Model": concepts/extension-execution-model.md
  - Reference:
      - "Configuration": reference/configuration.md
      - "HTTP Integration": reference/http.md
      - "Observability": reference/observability.md
      - "CLI": reference/cli.md
  - "Extension Development": extension-development.md
  - "Imprint": https://digitale-sammlungen.de/en/imprint
  - "Privacy Policy": https://digitale-sammlungen.de/en/privacy-policy
