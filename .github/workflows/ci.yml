name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  release:
    types: [published]

env:
  MAVEN_CLI_OPTS: "-B"

jobs:
  compile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - run: mvn $MAVEN_CLI_OPTS -U clean compile

  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install libvips
        run: sudo apt install -y libvips-dev
      - uses: jdx/mise-action@v4
      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - run: mvn $MAVEN_CLI_OPTS verify

  publish-snapshot:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: verify
    outputs:
      skip_deploy: ${{ steps.extract-version.outputs.skip_deploy }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Install XML utils
        run: sudo apt-get install -y libxml2-utils
      - name: Extract project version
        id: extract-version
        run: |
          PROJECT_VERSION=$(xmllint --xpath '/*[local-name()="project"]/*[local-name()="version"]/text()' pom.xml)
          echo "PROJECT_VERSION=$PROJECT_VERSION" >> "$GITHUB_ENV"
          if [[ ! "$PROJECT_VERSION" =~ .*SNAPSHOT ]]; then
            echo "skip_deploy=true" >> "$GITHUB_OUTPUT"
          fi
      - name: Set up JDK for publishing snapshot
        if: endsWith(env.PROJECT_VERSION, 'SNAPSHOT')
        uses: actions/setup-java@v5
        with:
          check-latest: true
          distribution: oracle
          java-version: '25'
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - name: Publish snapshot to Maven Central
        if: endsWith(env.PROJECT_VERSION, 'SNAPSHOT')
        run: mvn $MAVEN_CLI_OPTS deploy -P maven-central -DskipTests
        env:
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}

  publish-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    needs: verify
    steps:
      - uses: actions/checkout@v6
      - uses: actions/cache@v5
        with:
          path: ~/.m2/repository
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-maven-
      - name: Install XML utils
        run: sudo apt-get install -y libxml2-utils
      - name: Extract project version
        run: |
          PROJECT_VERSION=$(xmllint --xpath '/*[local-name()="project"]/*[local-name()="version"]/text()' pom.xml)
          echo "PROJECT_VERSION=$PROJECT_VERSION" >> "$GITHUB_ENV"
      - name: Set up JDK for publishing release
        if: "!endsWith(env.PROJECT_VERSION, 'SNAPSHOT')"
        uses: actions/setup-java@v5
        with:
          check-latest: true
          distribution: oracle
          java-version: '25'
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: MAVEN_GPG_PASSPHRASE
          server-id: central
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
      - name: Publish release to Maven Central
        if: "!endsWith(env.PROJECT_VERSION, 'SNAPSHOT')"
        run: mvn $MAVEN_CLI_OPTS deploy -Psign,maven-central -DskipTests
        env:
          MAVEN_GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}
          MAVEN_USERNAME: ${{ secrets.CENTRAL_USERNAME }}
          MAVEN_PASSWORD: ${{ secrets.CENTRAL_PASSWORD }}

  docker-snapshot:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-24.04
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository }}:latest

  docker-release:
    if: github.event_name == 'release'
    runs-on: ubuntu-24.04
    needs: verify
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v4
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ github.event.release.tag_name }}
            ghcr.io/${{ github.repository }}:latest
